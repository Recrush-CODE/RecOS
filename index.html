<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecOS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="desktop" id="desktop"></div>
    <div class="taskbar" id="taskbar">
        <div class="taskbar-left">
            <div class="menu-button" id="menuButton">☰</div>
            <div class="taskbar-apps" id="taskbarApps"></div>
        </div>
        <div class="taskbar-right">
            <div class="time-display" id="timeDisplay">00:00</div>
        </div>
    </div>
    <div class="app-menu-overlay" id="appMenuOverlay">
        <div class="app-menu-window" id="appMenuWindow">
            <div class="app-menu-grid" id="appMenuGrid">
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
